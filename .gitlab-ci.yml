# SPDX-License-Identifier: AGPL-3.0-or-later
# GitLab CI/CD for the Quip faucet.
# Publishes a linux/amd64 image to ${CI_REGISTRY_IMAGE} on main and on tags,
# matching the quip-network-node image (also amd64-only).
#
# The faucet pulls the *private* quip-protocol-rs over git and compiles the
# substrate runtime, so the image is built in two steps instead of from source
# inside the Dockerfile:
#   build-binary   compiles target/release/quip-faucet in the substrate
#                  toolchain image, authenticating to the private dep with the
#                  job token (the same path cargo-test uses), and exports the
#                  binary as an artifact.
#   publish-image  kaniko packages that prebuilt binary into a slim Debian
#                  image (COPY only). The job token never enters the Docker
#                  build, so it can never leak into an image or cache layer.

stages:
  - test
  - build
  - publish

variables:
  # → registry.gitlab.com/quip.network/faucet
  IMAGE: ${CI_REGISTRY_IMAGE}
  # Substrate toolchain image (rust 1.95.0 + clang/protoc/cmake + wasm32v1-none),
  # shared with quip-protocol-rs. Pinned rustc — see rust-toolchain.toml.
  TOOLCHAIN_IMAGE: docker.io/carback1/rust-substrate-builder:latest
  CARGO_HOME: $CI_PROJECT_DIR/.cargo
  CARGO_TERM_COLOR: always

# Run on merge requests (so the Rust faucet is build-checked before it reaches
# main), on main, and on tags. Non-main branch pushes without an MR get no
# pipeline (avoids duplicate branch+MR pipelines).
workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG

# ---------------------------------------------------------------------------
# Rust faucet: fmt / clippy / test. Runs on every MR so a build break is caught
# before merge. Uses the shared substrate toolchain image because building
# quip-protocol-runtime runs substrate-wasm-builder.
# ---------------------------------------------------------------------------
cargo-test:
  stage: test
  image: $TOOLCHAIN_IMAGE
  tags: [linux, amd64]
  interruptible: true
  timeout: 60m
  cache:
    key:
      files:
        - Cargo.lock
    paths:
      - .cargo/registry/cache
      - .cargo/registry/index
      - target/
  before_script:
    # quip-protocol-runtime's build script runs substrate-wasm-builder (the
    # image already ships the target/component, so these are no-ops there).
    - rustup target add wasm32v1-none
    - rustup component add rust-src
    # The faucet depends on the private quip-protocol-rs over ssh; in CI fetch it
    # over https with the job token instead. Requires this project's CI_JOB_TOKEN
    # to be allowed by quip-protocol-rs (Settings → CI/CD → Job token permissions).
    - git config --global url."https://gitlab-ci-token:${CI_JOB_TOKEN}@gitlab.com/".insteadOf "ssh://git@gitlab.com/"
  script:
    - cargo fmt --all -- --check
    - cargo clippy --all-targets -- -D warnings
    - cargo test

# ---------------------------------------------------------------------------
# Compile the release binary the image ships. Gated on main/tags (a release
# build is expensive and pointless on MRs). No explicit `needs`, so it runs
# after the `test` stage — the image is only ever built from green code. The
# binary is staged at the repo root so .dockerignore can ship just it (avoids
# the negation-into-excluded-dir footgun of a target/ path).
# ---------------------------------------------------------------------------
build-binary:
  stage: build
  image: $TOOLCHAIN_IMAGE
  tags: [linux, amd64]
  interruptible: true
  timeout: 60m
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG
  cache:
    key:
      files:
        - Cargo.lock
    paths:
      - .cargo/registry/cache
      - .cargo/registry/index
      - target/
  before_script:
    - rustup target add wasm32v1-none
    - rustup component add rust-src
    - git config --global url."https://gitlab-ci-token:${CI_JOB_TOKEN}@gitlab.com/".insteadOf "ssh://git@gitlab.com/"
  script:
    - cargo build --release --locked
    # install (not cp) so the executable bit is set explicitly, independent of
    # how artifacts round-trip permissions.
    - install -m 0755 target/release/quip-faucet quip-faucet
  artifacts:
    paths:
      - quip-faucet
    expire_in: 1 day

# ---------------------------------------------------------------------------
# Package the prebuilt binary into the published image. `needs: build-binary`
# pulls the `quip-faucet` artifact into the kaniko context; the Dockerfile is
# COPY-only (no toolchain, no git, no token).
# ---------------------------------------------------------------------------
publish-image:
  stage: publish
  image:
    name: gcr.io/kaniko-project/executor:v1.23.2-debug
    entrypoint: [""]
  tags: [linux, amd64]
  needs:
    - build-binary
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      variables:
        PRIMARY_TAG: latest
    - if: $CI_COMMIT_TAG
      variables:
        PRIMARY_TAG: $CI_COMMIT_TAG
  before_script:
    # The cuda runners' NVIDIA container runtime bind-mounts host GPU driver
    # firmware into every job container at /lib/firmware/nvidia/. kaniko's
    # rootfs extraction cannot replace /lib with the usr-merge symlink while
    # those mounts are busy, so the executor runs with --ignore-path=/lib,
    # which skips that replacement and preserves /lib as a plain directory.
    # The ELF interpreter resolves through /lib/x86_64-linux-gnu, so the RUN
    # (apt-get) in the Dockerfile needs this shim. It dangles until kaniko
    # unpacks the rootfs and never reaches the image: /lib is excluded from
    # snapshots and the final image's /lib symlink comes from the base layers.
    - mkdir -p /lib && ln -sfn /usr/lib/x86_64-linux-gnu /lib/x86_64-linux-gnu
    - mkdir -p /kaniko/.docker
    - echo "{\"auths\":{\"$CI_REGISTRY\":{\"auth\":\"$(echo -n ${CI_REGISTRY_USER}:${CI_REGISTRY_PASSWORD} | base64)\"}}}" > /kaniko/.docker/config.json
  script:
    # On tag pipelines, also publish a floating minor-series tag derived from the
    # release tag (e.g. v0.2.0 → :v0.2) so deployments can pin a series. Branch
    # pipelines get PRIMARY_TAG + sha only. The debug image ships busybox grep -oE.
    - |
      SERIES_DEST=""
      if [ -n "$CI_COMMIT_TAG" ]; then
        SERIES_TAG=$(printf '%s' "$CI_COMMIT_TAG" | grep -oE '^v[0-9]+\.[0-9]+' || true)
        [ -n "$SERIES_TAG" ] && SERIES_DEST="--destination=$IMAGE:$SERIES_TAG"
      fi
      /kaniko/executor \
        --context "$CI_PROJECT_DIR" \
        --dockerfile "$CI_PROJECT_DIR/Dockerfile" \
        --destination "$IMAGE:$PRIMARY_TAG" \
        --destination "$IMAGE:sha-$CI_COMMIT_SHORT_SHA" \
        $SERIES_DEST \
        --ignore-path=/lib
