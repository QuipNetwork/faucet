# SPDX-License-Identifier: AGPL-3.0-or-later
# GitLab CI/CD for the Quip faucet bot.
# Publishes a multi-arch image to ${CI_REGISTRY_IMAGE} on main and on tags.
# Mirrors the quip-protocol publish pattern: Kaniko (daemonless) on a
# linux/amd64 runner, docker buildx on the private macOS-arm64 shell
# runner, then manifest-tool stitches both per-arch tags into a single
# multi-arch manifest.

stages:
  - test
  - build
  - manifest

variables:
  # → registry.gitlab.com/quip.network/faucet
  IMAGE: ${CI_REGISTRY_IMAGE}

# Run on merge requests (so the Rust faucet is build-checked before it reaches
# main), on main, and on tags. Non-main branch pushes without an MR get no
# pipeline (avoids duplicate branch+MR pipelines).
workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG

# ---------------------------------------------------------------------------
# Rust faucet: fmt / clippy / test. Runs on every MR so a build break is caught
# before merge (the publish jobs below only run on main + tags, where the repo
# had no pre-merge signal). Uses the shared substrate toolchain image (rust +
# clang/protoc/cmake + wasm target) because building quip-protocol-runtime runs
# substrate-wasm-builder.
# ---------------------------------------------------------------------------
cargo-test:
  stage: test
  image: docker.io/carback1/rust-substrate-builder:latest
  tags: [linux, amd64]
  interruptible: true
  timeout: 60m
  variables:
    CARGO_HOME: $CI_PROJECT_DIR/.cargo
    CARGO_TERM_COLOR: always
  cache:
    key:
      files:
        - Cargo.lock
    paths:
      - .cargo/registry/cache
      - .cargo/registry/index
      - target/
  before_script:
    # quip-protocol-runtime's build script runs substrate-wasm-builder.
    - rustup target add wasm32v1-none
    - rustup component add rust-src
    # The faucet depends on the private quip-protocol-rs over ssh; in CI fetch it
    # over https with the job token instead. Requires this project's CI_JOB_TOKEN
    # to be allowed by quip-protocol-rs (Settings → CI/CD → Job token permissions).
    - git config --global url."https://gitlab-ci-token:${CI_JOB_TOKEN}@gitlab.com/".insteadOf "ssh://git@gitlab.com/"
  script:
    - cargo fmt --all -- --check
    - cargo clippy --all-targets -- -D warnings
    - cargo test

# ---------------------------------------------------------------------------
# Per-arch builds
# ---------------------------------------------------------------------------

build-amd64:
  stage: build
  image:
    name: gcr.io/kaniko-project/executor:v1.23.2-debug
    entrypoint: [""]
  tags: [linux, amd64]
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG
  before_script:
    # The cuda runners' NVIDIA container runtime bind-mounts host GPU driver
    # firmware into every job container at /lib/firmware/nvidia/. kaniko's
    # rootfs extraction cannot replace /lib with the usr-merge symlink while
    # those mounts are busy, so the executor runs with --ignore-path=/lib,
    # which skips that replacement and preserves /lib as a plain directory.
    # The ELF interpreter resolves through /lib/x86_64-linux-gnu (via the
    # /lib64 → /usr/lib64 → /lib/x86_64-linux-gnu symlink chain), so RUN
    # commands need this shim. It dangles until kaniko unpacks the rootfs,
    # and never reaches the image: /lib is excluded from snapshots and the
    # final image's /lib symlink comes from the base layers.
    - mkdir -p /lib && ln -sfn /usr/lib/x86_64-linux-gnu /lib/x86_64-linux-gnu
    - mkdir -p /kaniko/.docker
    - echo "{\"auths\":{\"$CI_REGISTRY\":{\"auth\":\"$(echo -n ${CI_REGISTRY_USER}:${CI_REGISTRY_PASSWORD} | base64)\"}}}" > /kaniko/.docker/config.json
  script:
    # --ignore-path=/lib: see the before_script comment — paired with the
    # /lib/x86_64-linux-gnu shim created there.
    - /kaniko/executor
        --context $CI_PROJECT_DIR
        --dockerfile Dockerfile
        --destination $IMAGE:$CI_COMMIT_SHA-amd64
        --ignore-path=/lib

build-arm64:
  stage: build
  tags: [macos, arm64]
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG
  before_script:
    # Isolated buildx builder per project. Create-if-missing is idempotent
    # across job retries. docker-container driver is required so --push
    # works in a single invocation.
    - docker buildx inspect quip-faucet-ci >/dev/null 2>&1 || docker buildx create --name quip-faucet-ci --driver docker-container --bootstrap
    - docker buildx use quip-faucet-ci
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
  script:
    - >
      docker buildx build
      --platform linux/arm64
      --push
      -t "$IMAGE:$CI_COMMIT_SHA-arm64"
      -f Dockerfile
      .
  after_script:
    - docker logout "$CI_REGISTRY" || true

# ---------------------------------------------------------------------------
# Multi-arch manifest (branch / tag)
# manifest-tool's `--template "...-ARCH"` is substituted per-platform
# (ARCH → amd64 / arm64) — the per-arch tags above must match exactly.
# ---------------------------------------------------------------------------

manifest-branch:
  stage: manifest
  image:
    name: mplatform/manifest-tool:alpine-v2.2.1
    entrypoint: [""]
  tags: [linux, amd64]
  needs:
    - build-amd64
    - build-arm64
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  script:
    - >
      manifest-tool
      --username "$CI_REGISTRY_USER"
      --password "$CI_REGISTRY_PASSWORD"
      push from-args
      --platforms linux/amd64,linux/arm64
      --template "$IMAGE:$CI_COMMIT_SHA-ARCH"
      --target "$IMAGE:$CI_COMMIT_SHA"
    - >
      manifest-tool
      --username "$CI_REGISTRY_USER"
      --password "$CI_REGISTRY_PASSWORD"
      push from-args
      --platforms linux/amd64,linux/arm64
      --template "$IMAGE:$CI_COMMIT_SHA-ARCH"
      --target "$IMAGE:latest"

manifest-tag:
  stage: manifest
  image:
    name: mplatform/manifest-tool:alpine-v2.2.1
    entrypoint: [""]
  tags: [linux, amd64]
  needs:
    - build-amd64
    - build-arm64
  rules:
    - if: $CI_COMMIT_TAG
  script:
    - >
      manifest-tool
      --username "$CI_REGISTRY_USER"
      --password "$CI_REGISTRY_PASSWORD"
      push from-args
      --platforms linux/amd64,linux/arm64
      --template "$IMAGE:$CI_COMMIT_SHA-ARCH"
      --target "$IMAGE:$CI_COMMIT_TAG"
    - >
      manifest-tool
      --username "$CI_REGISTRY_USER"
      --password "$CI_REGISTRY_PASSWORD"
      push from-args
      --platforms linux/amd64,linux/arm64
      --template "$IMAGE:$CI_COMMIT_SHA-ARCH"
      --target "$IMAGE:latest"
