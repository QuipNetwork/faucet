---
# SPDX-License-Identifier: AGPL-3.0-or-later
#
# Akash SDL v2.0 for faucet.testnet.quip.network (Phase B redeploy).
#
# Two services in one deployment:
#   - faucet: upstream Rust quip-faucet. Funder is op-1's hybrid account
#     (the chain sudo key); on boot it sudo-mints a dedicated base wallet,
#     funds a pool, and serves /request, /sign, /health. No internal
#     quipnode — RPC goes to the public bootnode endpoints over WSS, with
#     ordered failover.
#   - caddy:  public-facing TLS terminator + reverse proxy (443 global).
#     Cert dir at /certs is ephemeral, restored from Tarsnap on boot — the
#     certifier is invoked ONLY from the 12h renewal loop. Mirrors the
#     pad.quip.network pattern. Decouples container restarts from certifier
#     rate-limit risk (which caused the 2026-05-28 outage on the prior
#     issue-on-boot design).
#
# Secrets to fill before submitting (search for `<...>`):
#   <operator-1-mnemonic>            op-1's BIP-39 phrase (Proton Pass). The
#                                    Rust faucet derives op-1's hybrid account
#                                    from it natively — no seed-derivation step.
#                                    op-1 is the chain sudo key, so the faucet
#                                    can sudo-mint its base wallet. A 0x + 64-hex
#                                    seed works in this field too.
#   <certifier-token-faucet>         from certifier.quip.network admin for
#                                    faucet.testnet.quip.network (the old
#                                    token from the v1 deploy is still valid
#                                    if not revoked; otherwise mint fresh)
#   <testnet-caddy-tarsnap-key-base64>
#                                    base64-encoded Tarsnap machine key.
#                                    Shared key for all four testnet caddy
#                                    containers (Proton Pass:
#                                    TARSNAP_KEY_TESTNET_CADDY, "base64"
#                                    field). envsubst does NOT touch
#                                    <placeholder> strings — fill by hand
#                                    before submitting the SDL (memory:
#                                    akash-envsubst-placeholder-trap).
#
# Both images are anonymously pullable from registry.gitlab.com — do NOT
# add a credentials: block with placeholder strings (memory:
# akash-credentials-no-anonymous-fallback).

version: "2.0"

endpoints:
  faucet-ip:
    kind: ip

services:
  faucet:
    # Upstream Rust faucet — :latest is the Rust binary as of the image
    # cutover. It derives op-1's real hybrid account natively from the
    # mnemonic (HybridPair::from_string), so there is no patched image and no
    # master-seed derivation step (the Python faucet needed both because
    # substrate-interface could not ML-DSA-keygen an arbitrary mnemonic).
    # Pin :sha-<short> instead of :latest for a reproducible deploy.
    image: registry.gitlab.com/quip.network/faucet:latest
    args:
      # Ordered failover RPC endpoints: the faucet connects to the first
      # reachable and sticks to it, failing over on transport errors. The
      # bootnodes' Caddy reverse-proxies /rpc (path) to substrate's loopback
      # JSON-RPC over a trusted WSS cert. bootnode-1 is primary; confirm the
      # bootnode-2/3 ports before relying on failover (each bootnode's Caddy
      # may expose a different port).
      - --node-url=wss://bootnode-1.testnet.quip.network:20049/rpc
      - --node-url=wss://bootnode-2.testnet.quip.network:20049/rpc
      - --node-url=wss://bootnode-3.testnet.quip.network:20049/rpc
      - --listen-host=0.0.0.0
      - --port=8087
      - --rate-limit-seconds=60
      # Quip Testnet's chain name isn't in the dev-chain whitelist, so the
      # startup safety check rejects it unless overridden. Acceptable here —
      # testnet is the explicit target.
      - --allow-any-chain
    env:
      # op-1's BIP-39 mnemonic (Proton Pass). The faucet derives op-1's hybrid
      # account from it; op-1 is the chain sudo key, so base-wallet top-ups via
      # Sudo.sudo(FaucetOps.mint) succeed. Verify after deploy: the startup log
      # prints `funder: <ss58>` — confirm it equals op-1's known sudo address.
      - QUIP_FAUCET_FAUCET_KEY=<operator-1-mnemonic>
      - RUST_LOG=info
    expose:
      - port: 8087
        as: 8087
        to:
          - service: caddy

  caddy:
    image: registry.gitlab.com/quip.network/faucet:caddy-deploy-testnet-akash-3
    env:
      - QUIP_HOSTNAME=faucet.testnet.quip.network
      - FAUCET_UPSTREAM=faucet:8087
      - CERTIFIER_HOSTNAME=certifier.quip.network:9443
      - CERTIFIER_TOKEN=<certifier-token-faucet>
      - TARSNAP_KEY=<testnet-caddy-tarsnap-key-base64>
    expose:
      - port: 443
        as: 443
        to:
          - global: true
            ip: faucet-ip

profiles:
  compute:
    faucet:
      resources:
        cpu:
          units: 0.5
        memory:
          size: 512Mi
        storage:
          - size: 1Gi
    caddy:
      resources:
        cpu:
          units: 0.2
        memory:
          size: 256Mi
        storage:
          - size: 256Mi
  placement:
    dcloud:
      pricing:
        faucet:
          denom: uact
          amount: 1000
        caddy:
          denom: uact
          amount: 1000

deployment:
  faucet:
    dcloud:
      profile: faucet
      count: 1
  caddy:
    dcloud:
      profile: caddy
      count: 1
